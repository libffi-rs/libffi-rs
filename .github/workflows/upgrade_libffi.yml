name: Upgrade libffi
permissions:
  contents: write
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Libffi version number'
        required: true
        type: text
      url:
        description: 'URL of libffi .tar.gz release file or source archive'
        required: true
        type: text

env:
  VERSION: ${{ github.event.inputs.version }}
  PR_BRANCH: action-upgrade-${{ github.ref_name }}-to-libffi-${{ github.event.inputs.version }}
  BRANCH: ${{ github.ref_name }}
  LIBFFI_URL: ${{ github.event.inputs.url }}
  LIBFFI_DIR: libffi-sys-rs/libffi

jobs:
  download_unpack:
    name: 'Download and unpack'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup git author
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: Create new branch
        run: git switch -c "$PR_BRANCH"
      - name: Delete old libffi, download and unpack new
        run: |
          set -euxo pipefail
          rm -rf "$LIBFFI_DIR"
          mkdir -p "$LIBFFI_DIR"
          curl -fL -o "${{ runner.temp }}/libffi.tar.gz" "$LIBFFI_URL"
          sha256sum "${{ runner.temp }}/libffi.tar.gz"
          export SHASUM=$(sha256sum "${{ runner.temp }}/libffi.tar.gz" | cut -d " " -f 1)
          tar zxvf "${{ runner.temp }}/libffi.tar.gz" -C "$LIBFFI_DIR" --strip-components=1

          if [ ! -x "$LIBFFI_DIR/configure" ]; then
            echo "Archive does not contain generated autotools files; bootstrapping libffi from source snapshot."
            sudo apt-get update
            sudo apt-get install -y autoconf automake libtool libtool-bin make
            (
              cd "$LIBFFI_DIR"
              if [ -x ./autogen.sh ]; then
                ./autogen.sh
              else
                autoreconf -vfi
              fi
            )
          fi

          test -x "$LIBFFI_DIR/configure"
          git add "$LIBFFI_DIR"
          git commit -m "Downloaded libffi $VERSION from $LIBFFI_URL. SHA256 of the .tar.gz was $SHASUM."
          git push origin "$PR_BRANCH"
  
  generate_msvc_headers:
    name: 'Generate MSVC headers'
    runs-on: windows-latest
    needs: download_unpack
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.PR_BRANCH }}
      - name: Setup git author
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          path-type: inherit
      - name: Configure MSVC for x86_64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
      - name: Generate x86_64 headers
        shell: msys2 {0}
        env:
          MSYSTEM: MINGW64
        run: |
          set -euxo pipefail
          cd "$LIBFFI_DIR"
          rm -rf x86_64-pc-msys
          ./configure \
            --build x86_64-pc-msys \
            --target x86_64-pc-msys \
            --host x86_64-pc-msys \
            --disable-dependency-tracking \
            --with-pic \
            --disable-shared \
            --disable-docs \
            CPPFLAGS="-DFFI_BUILDING_DLL" \
            LD="link" \
            CC="$(pwd)/msvcc.sh -m64" \
            CXX="$(pwd)/msvcc.sh -m64" \
            CPP="cl.exe -nologo -EP" \
            CXXCPP="cl.exe -nologo -EP"
          cp -f x86_64-pc-msys/include/ffi.h ../include/msvc/x86_64/ffi.h
          cp -f x86_64-pc-msys/fficonfig.h ../include/msvc/x86_64/fficonfig.h
      - name: Configure MSVC for x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_x86
      - name: Generate 32-bit x86 headers
        shell: msys2 {0}
        env:
          MSYSTEM: MINGW32
        run: |
          set -euxo pipefail
          cd "$LIBFFI_DIR"
          rm -rf i686-pc-msys
          ./configure \
            --build i686-pc-msys \
            --target i686-pc-msys \
            --host i686-pc-msys \
            --disable-dependency-tracking \
            --with-pic \
            --disable-shared \
            --disable-docs \
            CPPFLAGS="-DFFI_BUILDING_DLL" \
            LD="link" \
            CC="$(pwd)/msvcc.sh" \
            CXX="$(pwd)/msvcc.sh" \
            CPP="cl.exe -nologo -EP" \
            CXXCPP="cl.exe -nologo -EP"
          cp -f i686-pc-msys/include/ffi.h ../include/msvc/x86/ffi.h
          cp -f i686-pc-msys/fficonfig.h ../include/msvc/x86/fficonfig.h
      - name: Configure MSVC for aarch64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64
      - name: Generate aarch64 headers
        shell: msys2 {0}
        env:
          MSYSTEM: MINGW32
        run: |
          set -euxo pipefail
          cd "$LIBFFI_DIR"
          rm -rf aarch64-pc-msys
          ./configure \
            --build x86_64-pc-msys \
            --target aarch64-pc-msys \
            --host aarch64-pc-msys \
            --disable-dependency-tracking \
            --with-pic \
            --disable-shared \
            --disable-docs \
            CPPFLAGS="-DFFI_BUILDING_DLL" \
            LD="link" \
            CC="$(pwd)/msvcc.sh" \
            CXX="$(pwd)/msvcc.sh" \
            CPP="cl.exe -nologo -EP" \
            CXXCPP="cl.exe -nologo -EP"
          cp -f aarch64-pc-msys/include/ffi.h ../include/msvc/aarch64/ffi.h
          cp -f aarch64-pc-msys/fficonfig.h ../include/msvc/aarch64/fficonfig.h
      - name: Commit changes to git
        continue-on-error: true
        run: |
          git add libffi-sys-rs/include
          git commit -m "Added updated headers for MSVC."
          git push origin
  
  create_pr:
    name: 'Create pull request'
    runs-on: ubuntu-latest
    needs: generate_msvc_headers
    permissions:
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.PR_BRANCH }}
      - name: 'Create pull request'
        run: gh pr create -B "$BRANCH" -H "$PR_BRANCH" --title "Upgrade to libffi $VERSION" --body "Upgraded to libffi $VERSION from .tar.gz at $LIBFFI_URL."